name: Label PRs

# Automatically applies labels to pull requests based on
# the files changed and the PR title.
on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

jobs:
  label:
    name: Auto-label
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------------------------------------------
      # Label by changed file paths
      # -----------------------------------------------------------------
      - name: Apply path-based labels
        uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: true

      # -----------------------------------------------------------------
      # Label by PR title prefix  (e.g. "fix: …" → bug, "feat: …" → enhancement)
      # -----------------------------------------------------------------
      - name: Apply title-based labels
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.pull_request.title.toLowerCase();
            const labels = [];

            if (/^(fix|bug|hotfix)[:(]/.test(title))         labels.push('bug');
            if (/^(feat|feature|add)[:(]/.test(title))       labels.push('enhancement');
            if (/^(docs?|readme|changelog)[:(]/.test(title)) labels.push('documentation');
            if (/^(chore|ci|build|release)[:(]/.test(title)) labels.push('chore');
            if (/^(refactor|perf|test)[:(]/.test(title))     labels.push('refactor');
            if (/\bbreaking\b/.test(title))                  labels.push('breaking change');

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: context.payload.pull_request.number,
                labels,
              });
            }
