name: Release Bundle

# Runs after publish-npm.yml completes on a tag push.
# Creates a GitHub Release and attaches the npm tarball as a downloadable asset.
on:
  workflow_run:
    workflows: ["Publish to npm"]
    types: [completed]

  # Also allow manual trigger for any existing tag
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.0.1)"
        required: true
        type: string

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    # Skip if publish-npm failed (workflow_run trigger only)
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # For workflow_run, check out the SHA that triggered publish
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build all bundles
        run: npm run build

      - name: Generate type declarations
        run: npm run build:types

      - name: Pack tarball
        run: npm pack
        # Produces: exotel-npm-dev-exotel-ai-assist-X.Y.Z.tgz

      - name: Resolve tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            # Derive from package.json version
            VERSION=$(node -p "require('./package.json').version")
            echo "name=v${VERSION}" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract changelog section for this version
        id: changelog
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          VERSION="${TAG#v}"
          # Try to extract the relevant section from CHANGELOG.md if it exists
          if [ -f CHANGELOG.md ]; then
            NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          fi
          if [ -z "$NOTES" ]; then
            NOTES="Release ${TAG}"
          fi
          # Write to a temp file to handle multi-line content
          echo "$NOTES" > /tmp/release_notes.md
          echo "file=/tmp/release_notes.md" >> "$GITHUB_OUTPUT"

      - name: Determine if pre-release
        id: prerelease
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          if echo "$TAG" | grep -qE '\-(alpha|beta|rc|next)'; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          body_path: ${{ steps.changelog.outputs.file }}
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
          files: "*.tgz"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Print release summary
        run: |
          VERSION="${{ steps.tag.outputs.name }}"
          echo "### GitHub Release created: \`${VERSION}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "https://github.com/${{ github.repository }}/releases/tag/${VERSION}" >> "$GITHUB_STEP_SUMMARY"
