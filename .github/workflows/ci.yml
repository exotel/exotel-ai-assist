name: CI

on:
  push:
    branches: ["**"]
    tags-ignore: ["v*"] # tag pushes are handled by publish-npm.yml
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & type-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build all bundles
        run: npm run build

      - name: Type declarations
        run: npm run build:types

      - name: Verify dist artefacts exist
        run: |
          test -f dist/index.js          || (echo "dist/index.js missing"          && exit 1)
          test -f dist/react/index.js    || (echo "dist/react/index.js missing"    && exit 1)
          test -f dist/controller/index.js || (echo "dist/controller/index.js missing" && exit 1)
          echo "All expected dist files present."

      - name: Upload dist as artefact (for inspection)
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 7
