name: Publish to npm

# -----------------------------------------------------------------
# Triggers
# -----------------------------------------------------------------
# 1. Automatically — when a version tag (v*.*.*) is pushed to main.
#    Typical flow: developer runs `npm version patch` locally, then
#    `git push origin main --follow-tags`.
#
# 2. Manually — from the GitHub Actions tab with a version bump type.
#    The workflow creates the version bump commit + tag and pushes them.
# -----------------------------------------------------------------
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*" # pre-release tags, e.g. v1.1.0-beta.1

  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      prerelease_tag:
        description: "Pre-release identifier (leave empty for stable release)"
        required: false
        default: ""
        type: string

jobs:
  publish:
    name: Build → Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write # needed to push the version commit and tag

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      # ----------------------------------------------------------
      # Manual trigger path: bump version, commit, tag, then push
      # ----------------------------------------------------------
      - name: Configure git for version commit (manual only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version (manual — stable)
        if: github.event_name == 'workflow_dispatch' && inputs.prerelease_tag == ''
        run: npm version ${{ inputs.bump }} -m "chore: release v%s [skip ci]"

      - name: Bump version (manual — pre-release)
        if: github.event_name == 'workflow_dispatch' && inputs.prerelease_tag != ''
        run: |
          # Derive new version from current + bump type, then append pre-release id
          CURRENT=$(node -p "require('./package.json').version")
          NEW=$(npx semver "$CURRENT" -i "${{ inputs.bump }}" --preid "${{ inputs.prerelease_tag }}")
          npm version "$NEW-${{ inputs.prerelease_tag }}.1" -m "chore: release v%s [skip ci]" || \
          npm version "pre${{ inputs.bump }}" --preid "${{ inputs.prerelease_tag }}" -m "chore: release v%s [skip ci]"

      - name: Push version commit and tag (manual only)
        if: github.event_name == 'workflow_dispatch'
        run: git push origin HEAD --follow-tags

      # ----------------------------------------------------------
      # Build
      # ----------------------------------------------------------
      - name: Build all bundles
        run: npm run build

      - name: Generate type declarations
        run: npm run build:types

      # ----------------------------------------------------------
      # Publish — stable release
      # ----------------------------------------------------------
      - name: Publish stable release
        if: |
          !contains(github.ref, '-')
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ----------------------------------------------------------
      # Publish — pre-release (tag = beta / rc / alpha / etc.)
      # ----------------------------------------------------------
      - name: Detect pre-release dist-tag
        if: contains(github.ref, '-')
        id: pretag
        run: |
          # Extract everything after the first dash in the version string
          # e.g. v1.1.0-beta.1  →  beta
          TAG=$(echo "${{ github.ref_name }}" | sed 's/v[0-9]*\.[0-9]*\.[0-9]*-//' | cut -d. -f1)
          echo "dist_tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Publish pre-release
        if: contains(github.ref, '-')
        run: npm publish --access public --tag ${{ steps.pretag.outputs.dist_tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ----------------------------------------------------------
      # Summary
      # ----------------------------------------------------------
      - name: Print published version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "### Published \`@exotel-npm-dev/exotel-ai-assist@${VERSION}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "https://www.npmjs.com/package/@exotel-npm-dev/exotel-ai-assist" >> "$GITHUB_STEP_SUMMARY"
